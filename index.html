<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bộ công cụ giảng dạy · VLUTE</title>
<meta name="description" content="Cổng công cụ soạn giảng, tạo ngân hàng câu hỏi và xử lý điểm của VLUTE.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12333F; --ink-2:#1B4451; --paper:#EEF0EC; --surface:#FFFFFF;
  --line:#DCE0DA; --line-soft:#E7EAE4; --muted:#65726E; --text:#22322F;
  --teal:#0E7C86; --clay:#CB3B33; --green:#3B6D11; --amber:#C8842B;
  --b:'Be Vietnam Pro',system-ui,-apple-system,sans-serif;
  --m:'IBM Plex Mono',ui-monospace,monospace;
  --shadow:0 1px 2px rgba(18,51,63,.04), 0 12px 28px -18px rgba(18,51,63,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--b);background:var(--paper);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
.app{display:grid;grid-template-columns:264px minmax(0,1fr);min-height:100vh}

/* ---------- Sidebar ---------- */
.side{background:var(--ink);color:#EAF1F1;padding:20px 18px;display:flex;flex-direction:column;gap:22px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:42px;height:42px;flex:none;border-radius:11px;background:#fff;color:var(--ink);display:grid;place-items:center;font-weight:800;font-size:15px;letter-spacing:.5px}
.brand .bt b{display:block;font-weight:700;font-size:14px;letter-spacing:.2px;line-height:1.2}
.brand .bt span{font-family:var(--m);font-size:10px;color:#8FBEC1;letter-spacing:.3px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav .lbl{font-family:var(--m);font-size:10px;letter-spacing:1.2px;color:#6C9497;text-transform:uppercase;padding:0 10px 8px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;color:#C6D8D9;font-family:var(--b);font-weight:600;font-size:13.5px;padding:9px 11px;border-radius:9px;cursor:pointer;transition:.14s}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.on{background:var(--amber);color:#fff}
.nav button .ct{margin-left:auto;font-family:var(--m);font-size:11px;opacity:.7}
.nav button.on .ct{opacity:.95}
.side .foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:14px}
.side .foot a{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:#9FC7C9;padding:7px 9px;border-radius:8px}
.side .foot a:hover{background:rgba(255,255,255,.07);color:#fff}
.side .foot .v{font-family:var(--m);font-size:10px;color:#5F8689;margin-top:9px;padding:0 9px}

/* ---------- Main ---------- */
.main{padding:26px 30px 48px;overflow:auto}
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:6px}
.hero h1{font-size:23px;font-weight:800;color:var(--ink);letter-spacing:-.2px}
.hero p{color:var(--muted);font-size:13.5px;margin-top:3px;max-width:52ch}
.hero .stat{font-family:var(--m);font-size:11.5px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;white-space:nowrap}
.hero .stat b{color:var(--ink)}

.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:20px 0 22px}
.search{flex:1;min-width:220px;position:relative}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
.search input{width:100%;font-family:var(--b);font-size:13.5px;color:var(--text);background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px 11px 38px}
.search input:focus{outline:0;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,124,134,.12)}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-family:var(--b);font-weight:600;font-size:12.5px;color:var(--muted);background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:8px 13px;cursor:pointer;transition:.14s}
.chip:hover{border-color:var(--line);color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ---------- Grid + cards ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 18px 16px 22px;display:flex;flex-direction:column;gap:12px;transition:.16s;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--ac)}
.card:hover{transform:translateY(-3px);border-color:var(--ac);box-shadow:var(--shadow)}
.card .top{display:flex;align-items:flex-start;gap:12px}
.card .icon{width:46px;height:46px;flex:none;border-radius:12px;background:var(--ac);color:#fff;display:grid;place-items:center}
.card .icon svg{width:23px;height:23px}
.card .code{font-family:var(--m);font-size:10px;font-weight:600;letter-spacing:.6px;color:var(--ac);background:color-mix(in srgb,var(--ac) 12%,#fff);border:1px solid color-mix(in srgb,var(--ac) 26%,#fff);border-radius:6px;padding:3px 7px;align-self:flex-start;margin-left:auto}
.card h3{font-size:15.5px;font-weight:700;color:var(--ink);line-height:1.25}
.card .role{font-family:var(--m);font-size:10.5px;letter-spacing:.3px;color:var(--muted);margin-top:2px}
.card .desc{font-size:13px;color:var(--muted);line-height:1.55;min-height:40px}
.card .tags{display:flex;gap:6px;flex-wrap:wrap}
.card .tag{font-size:11px;font-weight:600;color:var(--ink-2);background:var(--line-soft);border-radius:6px;padding:3px 8px}
.card .bottom{display:flex;align-items:center;gap:10px;margin-top:2px;padding-top:12px;border-top:1px solid var(--line-soft)}
.card .meta{font-family:var(--m);font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:6px;min-width:0}
.card .meta .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex:none}
.card .meta .fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .open{margin-left:auto;font-family:var(--b);font-weight:700;font-size:13px;color:#fff;background:var(--ac);border-radius:9px;padding:9px 15px;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:.14s}
.card .open:hover{filter:brightness(1.07)}
.card .open svg{width:15px;height:15px}
.card.soon{opacity:.62}
.card.soon .open{background:#B9C0BA;pointer-events:none}
.card.soon .meta .dot{background:var(--amber)}

.empty{display:none;text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{width:34px;height:34px;opacity:.4;margin-bottom:10px}

/* ---------- Mobile ---------- */
.mtop{display:none}
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .side{display:none}
  .mtop{display:flex;align-items:center;gap:11px;background:var(--ink);color:#fff;padding:14px 18px;position:sticky;top:0;z-index:10}
  .mtop .mark{width:34px;height:34px;border-radius:9px;background:#fff;color:var(--ink);display:grid;place-items:center;font-weight:800;font-size:12px}
  .mtop b{font-size:14px;font-weight:700}
  .mtop span{font-family:var(--m);font-size:10px;color:#8FBEC1;margin-left:auto}
  .main{padding:20px 16px 40px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}}
:focus-visible{outline:2.5px solid var(--amber);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>

<header class="mtop">
  <div class="mark">VL</div>
  <b>Bộ công cụ VLUTE</b>
  <span id="mCount"></span>
</header>

<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="side">
    <div class="brand">
      <div class="mark">VL</div>
      <div class="bt"><b>Công cụ hỗ trợ Elearning</b><span>Elearning toolkit</span></div>
    </div>
    <nav class="nav" id="nav">
      <div class="lbl">Danh mục</div>
    </nav>
    <div class="foot">
      <a href="#" id="addLink">
        <!-- <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Thêm công cụ mới -->
      </a>
      <div class="v">v1.0</div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <div class="hero">
      <div>
        <h1>ELEARNING TOOLKITS</h1>
        <p>Chọn công cụ để soạn bài, tạo ngân hàng câu hỏi hoặc xử lý điểm.</p>
      </div>
      <div class="stat">Đang có <b id="count">0</b> công cụ</div>
    </div>

    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="q" type="text" placeholder="Tìm công cụ theo tên, chức năng…" aria-label="Tìm công cụ">
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>Không tìm thấy công cụ nào khớp.</p>
    </div>
  </main>
</div>

<script>
/* =======================================================================
   DANH SÁCH CÔNG CỤ  —  chỉ cần sửa mảng này để thêm/bớt công cụ.
   Thêm 1 công cụ mới:
     1) Copy file .html của công cụ vào cùng thư mục với index.html
     2) Thêm 1 khối { ... } vào mảng TOOLS bên dưới
     3) Xong. Không cần sửa gì thêm.
   accent : "teal" | "clay" | "green" | "amber"  (màu nhận diện của thẻ)
   cat    : "content" | "assess" | "grade"       (danh mục ở cột trái)
   status : "ready"  -> mở được ngay
            "soon"   -> hiện mờ, ghi "sắp có", chưa bấm được
   ======================================================================= */
const ACCENTS = { teal:"#0E7C86", clay:"#CB3B33", green:"#3B6D11", amber:"#C8842B" };
const CATS = [
  { id:"all",     label:"Tất cả" },
  // { id:"content", label:"Nội dung bài giảng" },
  // { id:"assess",  label:"Kiểm tra · đánh giá" },
  // { id:"grade",   label:"Điểm số" },
];

const TOOLS = [
  {
    code:"SCORM",
    name:"Soạn bài giảng → SCORM",
    role:"Trình soạn bài · nhiều tuần",
    desc:"Soạn nội dung theo tuần, nhập dữ liệu từ Excel và xuất gói SCORM đưa lên LMS/Moodle.",
    tags:["Nhập Excel","Nhiều tuần","Xuất SCORM"],
    file:"CREATE_LESSON.html",
    accent:"teal", cat:"content", status:"ready",
    icon:'<path d="M4 5a2 2 0 0 1 2-2h11l3 3v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><line x1="8" y1="8" x2="15" y2="8"/><line x1="8" y1="12" x2="15" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/>'
  },
  {
    code:"QUIZ",
    name:"Tạo ngân hàng câu hỏi E-VLUTE",
    role:"Ngân hàng câu hỏi · XML",
    desc:"Tạo nhiều loại câu hỏi (trắc nghiệm, đúng/sai, điền khuyết, nối cặp) và xuất XML chuẩn E-VLUTE tương thích Moodle.",
    tags:["6 loại câu hỏi","Nhập Word/Excel","Xuất XML"],
    file:"CREATE_QUIZ.html",
    accent:"clay", cat:"assess", status:"ready",
    icon:'<path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/>'
  },
  {
    code:"ĐIỂM",
    name:"Xử lý điểm thành phần",
    role:"Nhập · điều chỉnh điểm",
    desc:"Nhận nhiều file Excel điểm CC, QT1–QT3, KTHP, tự dò cột và tổng hợp vào phiếu điểm chung theo hệ số.",
    tags:["Gộp nhiều file","Tự dò cột","Theo hệ số"],
    file:"PROCESS_MARK.html",
    accent:"green", cat:"grade", status:"ready",
    icon:'<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/>'
  },
];
/* ===================== HẾT PHẦN CẦN CHỈNH SỬA ========================= */

const grid=document.getElementById('grid'), empty=document.getElementById('empty');
let activeCat="all", term="";

function iconSvg(paths){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';}

function buildSidebar(){
  const nav=document.getElementById('nav');
  const chips=document.getElementById('chips');
  CATS.forEach(c=>{
    const n = c.id==="all" ? TOOLS.length : TOOLS.filter(t=>t.cat===c.id).length;
    const b=document.createElement('button');
    b.innerHTML=c.label+'<span class="ct">'+n+'</span>';
    b.onclick=()=>{activeCat=c.id;syncActive();render();};
    b.dataset.cat=c.id; nav.appendChild(b);

    const ch=document.createElement('button');
    ch.className='chip'; ch.textContent=c.label; ch.dataset.cat=c.id;
    ch.onclick=()=>{activeCat=c.id;syncActive();render();};
    chips.appendChild(ch);
  });
  syncActive();
}
function syncActive(){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.cat===activeCat));
  document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('on',b.dataset.cat===activeCat));
}

function render(){
  const list=TOOLS.filter(t=>{
    const okCat = activeCat==="all" || t.cat===activeCat;
    const hay=(t.name+' '+t.role+' '+t.desc+' '+t.tags.join(' ')).toLowerCase();
    return okCat && (!term || hay.includes(term));
  });
  grid.innerHTML='';
  list.forEach(t=>{
    const ac=ACCENTS[t.accent]||ACCENTS.teal;
    const soon=t.status==="soon";
    const card=document.createElement(soon?'div':'a');
    card.className='card'+(soon?' soon':'');
    card.style.setProperty('--ac',ac);
    if(!soon){card.href=t.file;}
    card.innerHTML=
      '<div class="top">'+
        '<div class="icon">'+iconSvg(t.icon)+'</div>'+
        '<span class="code">'+t.code+'</span>'+
      '</div>'+
      '<div><h3>'+t.name+'</h3><div class="role">'+t.role+'</div></div>'+
      '<div class="desc">'+t.desc+'</div>'+
      '<div class="tags">'+t.tags.map(x=>'<span class="tag">'+x+'</span>').join('')+'</div>'+
      '<div class="bottom">'+
        '<div class="meta"><span class="dot"></span><span class="fn">'+(soon?'Sắp có':'Sẵn sàng')+'</span></div>'+
        '<span class="open">'+(soon?'Sắp có':'Mở công cụ')+
          (soon?'':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>')+
        '</span>'+
      '</div>';
    grid.appendChild(card);
  });
  empty.style.display=list.length?'none':'block';
}

document.getElementById('q').addEventListener('input',e=>{term=e.target.value.trim().toLowerCase();render();});
document.getElementById('addLink').addEventListener('click',e=>{
  e.preventDefault();
  alert('Thêm công cụ mới:\n\n1. Copy file .html của công cụ vào cùng thư mục với index.html\n2. Mở index.html, tìm mảng TOOLS và thêm một khối mới\n3. Lưu lại và deploy — xong.\n\n(Xem hướng dẫn chi tiết trong README.md)');
});

const total=TOOLS.length;
document.getElementById('count').textContent=total;
document.getElementById('mCount').textContent=total+' công cụ';
buildSidebar();
render();
</script>
</body>
</html>
